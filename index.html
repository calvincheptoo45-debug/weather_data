<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Alerts App</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <h1>Weather Alerts</h1>

    <p>Enter a U.S. state abbreviation (e.g. CA, NY, TX)</p>

    <div class="input-section">
      <input
        type="text"
        id="stateInput"
        placeholder="Enter state (e.g. CA)"
      />

      <button id="fetchBtn">Get Alerts</button>
    </div>

    <div id="weatherResults"></div>
  </div>

  <script src="index.js"></script>
</body>
</html>
